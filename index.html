<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 引导弹窗 · Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", -apple-system, sans-serif;
    background: #F5F5F5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 20px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #111;
    letter-spacing: 0.5px;
  }

  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #fff;
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    width: 200px;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.13);
  }

  .card-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: #FFDD00;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #111;
    text-align: center;
  }

  .card-desc {
    font-size: 12px;
    color: #888;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>OCR 引导弹窗 · 动效 Demo</h1>

<div class="cards">
  <a class="card" href="ocr-urgent-upload.html">
    <div class="card-icon">✨</div>
    <div class="card-title">扫光 + 呼吸</div>
    <div class="card-desc">按钮扫光动效<br>+ 呼吸缩放</div>
  </a>

  <a class="card" href="ocr-urgent-upload-hand.html?v=3">
    <div class="card-icon">👆</div>
    <div class="card-title">小手点击</div>
    <div class="card-desc">小手斜向点击<br>+ 白色圆圈反馈</div>
  </a>
</div>

</body>
</html>
